        import_method: importComponentSetByKeyAsync
        variant_to_select: { State: AddFavorite, Language: EN }

    container:
      name_template: "Purpose=${Purpose}, Language=EN"

      # Per-variant fixed size
      size:
        by_variant:
          - when: { Purpose: LiveStreaming }
            value: { width: 110, height: 56 }
          - when: { Purpose: AvatarTop }
            value: { width: 107, height: 56 }
          - when: { Purpose: otherUser }
            value: { width: 110, height: 112 }
          - when: { Purpose: Unblock }
            value: { width: 120, height: 112 }
          - when: { Purpose: selfProfile }
            value: { width: 186, height: 224 }
          - when: { Purpose: talkChat_Share }
            value: { width: 178, height: 224 }
          - when: { Purpose: "call Option menu" }
            value: { width: 178, height: 280 }

      corner_radius: 16
      clips_content: true
      fills: [{ type: SOLID, color: "#EAEAEA" }]

      auto_layout:
        direction: VERTICAL
        primary_axis_align_items: MIN
        counter_axis_align_items: MIN
        padding: { top: 0, right: 0, bottom: 0, left: 0 }
        item_spacing: 0
        primary_axis_sizing_mode: AUTO
        counter_axis_sizing_mode: FIXED

      # All menu items use this shared structure (icon 24x24 + text Noto Sans JP Medium 14)
      # Canonical order across variants (matches Library):
      #   1. contextMenuFavorite (talkChat_Share, call)
      #   2. Settings              (selfProfile)
      #   3. Verification Badge    (selfProfile)
      #   4. Block                 (otherUser)
      #   5. Unblock               (Unblock)
      #   6. Delete                (AvatarTop)
      #   7. Share on SNS          (selfProfile, call)
      #   8. Customize             (talkChat_Share, call)
      #   9. Follow (Self)         (talkChat_Share, call)
      #  10. Follow (Other)        (Unblock)
      #  11. Help Centre           (selfProfile)
      #  12. Report                (LiveStreaming, otherUser, talkChat_Share, call)
      children:
        - kind: INSTANCE
          ref: "icon_refs[tab=ContextMenuFavoriteAddEN]"
          layout_sizing: { horizontal: FILL }
          when: { Purpose: [talkChat_Share, "call Option menu"] }

        # menu(iconTab, text, purposes) — repeated for each row
        - { kind: FRAME, name: menu, size: { height: 56 }, fills: [],
            auto_layout: { direction: HORIZONTAL, item_spacing: 8,
              padding: { top: 16, right: 16, bottom: 16, left: 16 },
              primary_axis_align_items: MIN, counter_axis_align_items: CENTER,
              primary_axis_sizing_mode: FIXED, counter_axis_sizing_mode: AUTO },
            layout_sizing: { horizontal: FILL },
            children: [
              { kind: INSTANCE, ref: "icon_refs[tab=Settings]", size: { width: 24, height: 24 } },
              { kind: TEXT, name: text, characters: "Settings",
                font: { family: Noto Sans JP, style: Medium }, font_size: 14,
                line_height: { unit: PERCENT, value: 100 },
                fills: [{ type: SOLID, color: "#2E2E2E" }], text_align_horizontal: LEFT },
            ],
            when: { Purpose: [selfProfile] } }

        - { kind: FRAME, name: menu, size: { height: 56 }, fills: [],
