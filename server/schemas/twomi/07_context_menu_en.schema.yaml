# ============================================================
# 07_context_menu_en.schema.yaml
# ============================================================
# contextMenu ComponentSet (Library - Guideline) — Language=EN only
#   7 variants by Purpose:
#     LiveStreaming     (110×56)   — Report
#     AvatarTop         (107×56)   — Delete
#     otherUser         (110×112)  — Block, Report
#     Unblock           (120×112)  — Unblock, Follow(Other)
#     selfProfile       (186×224)  — Settings, Verification Badge,
#                                    Share on SNS, Help Centre
#     talkChat_Share    (178×224)  — Add to favourites (contextMenuFavorite),
#                                    Customize, Follow(Self), Report
#     call Option menu  (178×280)  — Add to favourites, Share on SNS,
#                                    Customize, Follow(Self), Report
#
# Structure: each variant is a VERTICAL stack of "menu" FRAMEs (icon + text)
# inside a rounded #EAEAEA container. Items use `when: { Purpose: [...] }`
# filters; canonical order across variants is preserved.
# ============================================================

meta:
  name: contextMenu (EN)
  library_source:
    file_key: CPe64VQc7petbZawTE6J8o
    component_set_node_id: "5a357e53ca44c716d553213dec9325620553847d"
  description: |
    The popover menu shown on long-press of various surfaces (other users,
    own profile, live stream, talk chat, call). Each Purpose value matches
    a UX context with a specific set of menu items in a canonical order
    (Block / Settings / Share / Customize / Follow / Report / etc.).
    Only Language=EN variants are implemented here; JP variants pending.
  screen_usage:
    - User profile context menu (Purpose=otherUser / Unblock / selfProfile)
    - Live stream more menu (Purpose=LiveStreaming)
    - Avatar top more menu (Purpose=AvatarTop)
    - Talk chat sharing menu (Purpose=talkChat_Share)
    - Call option menu (Purpose=call Option menu)
  dependencies:
    - Library icons: ShieldWarning / TrashBin / UserBlockRounded / Settings /
      VerifiedBadge (Premium) / ForwardArrow / Help / MagicStick3 / UserIcon (Self/Other)
    - contextMenuFavorite ComponentSet (nested INSTANCE for talkChat_Share + call)
  runtime_version: v0.5
  coverage:
    total_variants: 7
    implemented: 7
    notes: JP variants (7 more) intentionally skipped; user requested EN only.
  review_status: ai-draft

components:
  - id: contextMenu (EN)
    variants:
      combinations:
        - { Purpose: LiveStreaming }
        - { Purpose: AvatarTop }
        - { Purpose: otherUser }
        - { Purpose: Unblock }
        - { Purpose: selfProfile }
        - { Purpose: talkChat_Share }
        - { Purpose: "call Option menu" }

    icon_refs:
      - tab: ShieldWarning
        asset_type: COMPONENT
        library_component_key: "07f12a3a847821096182ec11b2c4c8b063f4e60b"
        import_method: importComponentByKeyAsync
      - tab: TrashBin
        asset_type: COMPONENT
        library_component_key: "23308b913fc80bd020a032a18375a26360bef10c"
        import_method: importComponentByKeyAsync
      - tab: UserBlockRounded
