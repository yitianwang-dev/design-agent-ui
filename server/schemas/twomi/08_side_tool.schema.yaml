# ============================================================
# 08_side_tool.schema.yaml
# ============================================================
# SideTool ComponentSet (Library - Guideline)
#   2 variants by Status: Default / Select
#
# Layout:
#   Container 92×40, HORIZONTAL, primary=MAX (text+icon packed right)
#   - Sub text "Upload" — Noto Sans JP Bold 13 / 100% / #FFFFFF, drop shadow
#   - Icon FRAME 40×40 r=20:
#       Default: fill #DADADA, no effects
#       Select : fill #FFFFFF/0.8, DROP_SHADOW + GLASS (Liquid Glass)
#     Contains: Reel SVG (inlined — Library icon not separately importable)
#
# Notes:
#   - Library text style is Noto Sans JP SemiBold; falls back to Bold here
#     since SemiBold isn't installed on this machine.
#   - Reel icon Library key (c77e34954341f3754fcaa34a7722f28072dcdc22)
#     is not publishable, so the icon is inlined as SVG path data
#     (extracted via exportAsync from an imported instance).
# ============================================================

meta:
  name: SideTool
  figma_catalog_name: "SideTool"  # exact name in Library - Guideline
  library_component_key: "4d253cf55095f9578e71a34a6ddedc40586ac5b8"  # COMPONENT_SET
  library_source:
    file_key: CPe64VQc7petbZawTE6J8o
    component_set_node_id: "4d253cf55095f9578e71a34a6ddedc40586ac5b8"
  description: |
    Right-side floating tool button shown next to media controls (avatar
    video, live stream). Text label ("Upload") on the left + circular icon
    on the right. Select state adds Liquid Glass effect + brighter fill
    to indicate the tool is currently active.
  screen_usage:
    - Avatar video editing screens
    - Live stream creator-side tools
  dependencies:
    - Reel icon (inlined SVG — Library key c77e34954... not separately publishable)
  runtime_version: v0.5
  coverage:
    total_variants: 2
    implemented: 2
    notes: |
      Noto Sans JP "SemiBold" not installed locally; falls back to "Bold"
      (visually nearly identical).
  review_status: ai-draft

# (canonical) Schema definition
components:
  - id: SideTool
    variants:
      combinations:
        - { Status: Default }
        - { Status: Select }

    container:
      name_template: "Status=${Status}"
      size: { width: 92, height: 40 }
      clips_content: false
      fills: []
      auto_layout:
        direction: HORIZONTAL
        primary_axis_align_items: MAX
        counter_axis_align_items: CENTER
        padding: { top: 0, right: 0, bottom: 0, left: 0 }
        item_spacing: 6
        primary_axis_sizing_mode: AUTO
        counter_axis_sizing_mode: AUTO
      corner_radius: 24

      children:
        # Sub text "Upload" — white with drop shadow
        - kind: TEXT
          name: Sub text
          characters: "Upload"
          font: { family: Noto Sans JP, style: Bold }
          font_size: 13
          line_height: { unit: PERCENT, value: 100 }
          fills: [{ type: SOLID, color: "#FFFFFF" }]
          text_align_horizontal: CENTER
          effects:
            by_variant:
              - when: { Status: Default }
                value:
                  - { type: DROP_SHADOW, color: "#000000", opacity: 0.3,
                      offset: { x: 0, y: 4 }, radius: 6 }
              - when: { Status: Select }
                value:
                  - { type: DROP_SHADOW, color: "#000000", opacity: 0.4,
                      offset: { x: 0, y: 4 }, radius: 6 }

        # Icon container — 40×40 circle
        - kind: FRAME
          name: Icon
          size: { width: 40, height: 40 }
          corner_radius: 20
          clips_content: false
          fills:
            by_variant:
              - when: { Status: Default }
                paints: [{ type: SOLID, color: "#DADADA" }]
              - when: { Status: Select }
                paints: [{ type: SOLID, color: "#FFFFFF", opacity: 0.8 }]
          effects:
            by_variant:
              - when: { Status: Default }
                value: []
              - when: { Status: Select }
                value:
                  - { type: DROP_SHADOW, color: "#000000", opacity: 0.4,
                      offset: { x: 0, y: 0 }, radius: 3 }
                  - { type: GLASS, radius: 4 }
          auto_layout:
            direction: HORIZONTAL
            primary_axis_align_items: CENTER
            counter_axis_align_items: CENTER
            padding: { top: 0, right: 0, bottom: 0, left: 0 }
            item_spacing: 10
            primary_axis_sizing_mode: FIXED
            counter_axis_sizing_mode: FIXED
          children:
            # Reel icon — inlined SVG (Library icon not separately publishable)
            - kind: SVG
              name: "Outline / Video, Audio, Sound / Reel"
              size: { width: 21, height: 21 }
              svg: |
                <svg width="21" height="21" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M10.5 2.40625C6.02995 2.40625 2.40625 6.02995 2.40625 10.5C2.40625 14.9701 6.02995 18.5938 10.5 18.5938C14.9701 18.5938 18.5938 14.9701 18.5938 10.5C18.5938 6.02995 14.9701 2.40625 10.5 2.40625ZM15.2955 18.5938C18.056 16.9546 19.9062 13.9434 19.9062 10.5C19.9062 5.30507 15.6949 1.09375 10.5 1.09375C5.30507 1.09375 1.09375 5.30507 1.09375 10.5C1.09375 15.6949 5.30507 19.9062 10.5 19.9062H19.25C19.6124 19.9062 19.9062 19.6124 19.9062 19.25C19.9062 18.8876 19.6124 18.5938 19.25 18.5938H15.2955ZM10.5 5.90625C10.1376 5.90625 9.84375 6.20006 9.84375 6.5625C9.84375 6.92494 10.1376 7.21875 10.5 7.21875C10.8624 7.21875 11.1562 6.92494 11.1562 6.5625C11.1562 6.20006 10.8624 5.90625 10.5 5.90625ZM8.53125 6.5625C8.53125 5.47519 9.41269 4.59375 10.5 4.59375C11.5873 4.59375 12.4688 5.47519 12.4688 6.5625C12.4688 7.64981 11.5873 8.53125 10.5 8.53125C9.41269 8.53125 8.53125 7.64981 8.53125 6.5625ZM6.5625 9.84375C6.20006 9.84375 5.90625 10.1376 5.90625 10.5C5.90625 10.8624 6.20006 11.1562 6.5625 11.1562C6.92494 11.1562 7.21875 10.8624 7.21875 10.5C7.21875 10.1376 6.92494 9.84375 6.5625 9.84375ZM4.59375 10.5C4.59375 9.41269 5.47519 8.53125 6.5625 8.53125C7.64981 8.53125 8.53125 9.41269 8.53125 10.5C8.53125 11.5873 7.64981 12.4688 6.5625 12.4688C5.47519 12.4688 4.59375 11.5873 4.59375 10.5ZM14.4375 9.84375C14.0751 9.84375 13.7812 10.1376 13.7812 10.5C13.7812 10.8624 14.0751 11.1562 14.4375 11.1562C14.7999 11.1562 15.0938 10.8624 15.0938 10.5C15.0938 10.1376 14.7999 9.84375 14.4375 9.84375ZM12.4688 10.5C12.4688 9.41269 13.3502 8.53125 14.4375 8.53125C15.5248 8.53125 16.4062 9.41269 16.4062 10.5C16.4062 11.5873 15.5248 12.4688 14.4375 12.4688C13.3502 12.4688 12.4688 11.5873 12.4688 10.5ZM10.5 13.7812C10.1376 13.7812 9.84375 14.0751 9.84375 14.4375C9.84375 14.7999 10.1376 15.0938 10.5 15.0938C10.8624 15.0938 11.1562 14.7999 11.156