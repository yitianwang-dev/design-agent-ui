<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1F2937;
      background: #F9FAFB;
    }
    .container { padding: 20px; }
    h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #111827; }

    .field { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #6B7280; margin-bottom: 4px; }
    input {
      width: 100%; padding: 8px 10px;
      border: 1px solid #E5E7EB; border-radius: 6px;
      font-size: 13px; outline: none;
    }
    input:focus { border-color: #35C1C6; }

    .btn {
      width: 100%; padding: 10px;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-primary { background: #35C1C6; color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-stop { background: #EF4444; color: #fff; margin-top: 8px; }
    .btn-stop:hover { opacity: 0.85; }

    .status-box {
      margin-top: 16px; padding: 12px;
      background: #fff; border: 1px solid #E5E7EB;
      border-radius: 8px; min-height: 80px;
    }
    .status-label { font-size: 11px; font-weight: 600; color: #9CA3AF; margin-bottom: 6px; }
    .status-text { font-size: 13px; line-height: 1.6; color: #374151; }

    .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 6px;
    }
    .dot-idle { background: #9CA3AF; }
    .dot-polling { background: #F59E0B; animation: pulse 1.2s infinite; }
    .dot-running { background: #3B82F6; animation: pulse 0.8s infinite; }
    .dot-done { background: #10B981; }
    .dot-error { background: #EF4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    .log {
      margin-top: 8px; font-size: 11px; color: #9CA3AF;
      max-height: 120px; overflow-y: auto; line-height: 1.8;
    }
    .divider { height: 1px; background: #E5E7EB; margin: 16px 0; }
  </style>
</head>
<body>
<div class="container">
  <h2>Design Agent</h2>

  <div class="field">
    <label>ユーザーID（メールアドレス）</label>
    <input type="text" id="userId" placeholder="you@example.com">
  </div>

  <button class="btn btn-primary" id="startBtn">ジョブを待機する</button>
  <button class="btn btn-stop" id="stopBtn" style="display:none">停止</button>

  <div class="divider"></div>

  <div class="status-box">
    <div class="status-label">ステータス</div>
    <div class="status-text" id="statusText">
      <span class="dot dot-idle"></span>待機中
    </div>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
const API = 'https://design-agent-ui-production.up.railway.app';
let pollInterval = null;
let isRunning = false;

function log(msg) {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('ja-JP');
  el.innerHTML += `<div>${time} ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(dotClass, text) {
  document.getElementById('statusText').innerHTML =
    `<span class="dot ${dotClass}"></span>${text}`;
}

function saveUserId() {
  try { localStorage.setItem('da_userId', document.getElementById('userId').value); } catch (e) {}
}

function startPolling() {
  const userId = document.getElementById('userId').value.trim();
  if (!userId) { alert('ユーザーIDを入力してください'); return; }
  saveUserId();

  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  setStatus('dot-polling', 'ジョブを待機中...');
  log('ポーリング開始');

  pollInterval = setInterval(() => poll(userId), 4000);
  poll(userId);
}

function stopPolling() {
  clearInterval(pollInterval);
  pollInterval = null;
  isRunning = false;
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  setStatus('dot-idle', '停止中');
  log('ポーリング停止');
}

async function poll(userId) {
  if (isRunning) return;
  try {
    const res = await fetch(`${API}/jobs/pending/${encodeURIComponent(userId)}`);
    const job = await res.json();
    if (!job) return;

    isRunning = true;
    setStatus('dot-running', `実行中: ${job.input?.screenName || job.id}`);
    log(`ジョブ受信: ${job.id}`);

    parent.postMessage({ pluginMessage: { type: 'execute-job', jobId: job.id, code: job.output_js } }, '*');
  } catch (err) {
    log(`エラー: ${err.message}`);
  }
}

window.onmessage = async (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  const userId = document.getElementById('userId').value.trim();

  if (msg.type === 'job-done') {
    log(`完了: ${msg.jobId}`);
    setStatus('dot-done', '完了！');
    await fetch(`${API}/jobs/${msg.jobId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'done', figmaNode: JSON.stringify(msg.result) }),
    });
    isRunning = false;
    setStatus('dot-polling', 'ジョブを待機中...');
  }

  if (msg.type === 'job-error') {
    log(`失敗: ${msg.error}`);
    setStatus('dot-error', `失敗: ${msg.error}`);
    await fetch(`${API}/jobs/${msg.jobId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'error', error: msg.error }),
    });
    isRunning = false;
    setStatus('dot-polling', 'ジョブを待機中...');
  }
};

document.getElementById('startBtn').addEventListener('click', startPolling);
document.getElementById('stopBtn').addEventListener('click', stopPolling);

// 保存済みのuserIdを復元
try {
  document.getElementById('userId').value = localStorage.getItem('da_userId') || '';
} catch (e) {
  // localStorage not available in some contexts
}
</script>
</body>
</html>
